name: movieapp
description: Netflix-like Flutter movie streaming app shell for TV, mouse, and touch.
publish_to: "none"
version: 0.1.0+1

# Production build:
# flutter build appbundle --release --split-debug-info=build/symbols --obfuscate
# flutter build apk --release --split-per-abi --split-debug-info=build/symbols --obfuscate

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.5
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  
flutter:
  uses-material-design: true
